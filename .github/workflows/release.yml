name: release

# Build standalone `celeborn` binaries on a version tag, then attach them to the GitHub Release.
# Homebrew/Scoop/winget manifests point at these assets.
#
# Targets: macOS arm64 (Apple Silicon) + Windows x86_64. macOS Intel (x86_64) is deferred — the
# macos-13 GitHub-hosted runner is queue-starved in this org and stalled the release; Intel-mac users
# install via the uv/curl path until a runner is available (re-add the macos-13 matrix entry then).
# The Windows .exe is UNSIGNED (no Authenticode cert wired) — SmartScreen shows "unknown publisher".
#
# Tag to release:  git tag v0.1.0 && git push origin v0.1.0
#
# Code signing/notarization is intentionally NOT wired here yet — it needs the org's Apple Developer
# ID (macOS) and Authenticode (Windows) certs as repo secrets. Until then, users may see an
# "unidentified developer" warning. See packaging/README.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # create/upload to the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple silicon (arm64)
            asset: celeborn-macos-arm64
            ext: ""
          - os: windows-latest  # Windows (x86_64)
            asset: celeborn-windows-x86_64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary (unix)
        if: runner.os != 'Windows'
        run: bash packaging/build-binary.sh
      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/build-binary.ps1

      - name: Stage + checksum
        shell: bash
        run: |
          mkdir -p out
          cp "dist/celeborn${{ matrix.ext }}" "out/${{ matrix.asset }}${{ matrix.ext }}"
          cd out
          if command -v shasum >/dev/null; then
            shasum -a 256 "${{ matrix.asset }}${{ matrix.ext }}" > "${{ matrix.asset }}${{ matrix.ext }}.sha256"
          else
            sha256sum "${{ matrix.asset }}${{ matrix.ext }}" > "${{ matrix.asset }}${{ matrix.ext }}.sha256"
          fi

      - name: Smoke test
        shell: bash
        run: "./dist/celeborn${{ matrix.ext }} version"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
